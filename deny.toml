[graph]
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Unlicense",
  "Zlib",
]
confidence-threshold = 0.8

# arborium-nginx is GPL-3.0 (tree-sitter grammar for nginx config). It
# comes in transitively via tracey-core -> marq[all-handlers] -> arborium,
# is never called by mdbook-tracey, and is dead-code-eliminated from the
# release binary — but cargo-deny checks the lockfile, not the link graph.
[[licenses.exceptions]]
name = "arborium-nginx"
allow = ["GPL-3.0"]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[advisories]
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
